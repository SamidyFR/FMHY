name: Sync From OG Repo

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/fmhy/edit.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "Merge conflict detected"

      - name: Push changes
        run: git push origin main
